        // 使用 Array.from 可以正確拆分包含 🅐🅑 等代理對(Surrogate Pair)的特殊字元
        const SPECIAL_SYMBOLS = new Set(Array.from(SPECIAL_SYMBOLS_STR));

        function parseList(str) {
            return str.split(/[,、，\n]/).map(s => s.trim()).filter(s => s.length > 0);
        }

        function encodeRTFText(text) {
            return Array.from(text).map(char => {
                if (char === '\\') return '\\\\';
                if (char === '{') return '\\{';
                if (char === '}') return '\\}';
                
                // 處理可能為 Surrogate pair 的字元（如 🅐🅑）
                if (char.length > 1) {
                    const code1 = char.charCodeAt(0);
                    const code2 = char.charCodeAt(1);
                    return `\\u${code1 > 32767 ? code1 - 65536 : code1}?\\u${code2 > 32767 ? code2 - 65536 : code2}?`;
                }

                const code = char.charCodeAt(0);
                if (code > 127) return `\\u${code > 32767 ? code - 65536 : code}?`;
                return char;
            }).join('');
        }

        function generate() {

                    const finalIgnored = [...parseList(BUILT_IN_IGNORED), ...parseList(extraIgn)];
                    const finalImportant = [...parseList(BUILT_IN_IMPORTANT), ...parseList(extraImp)].sort((a,b) => b.length - a.length);

                    // === 修改：在 fonttbl 中加入 \f1 GenRyuMin JP M ===
                    let rtf = `{\\rtf1\\ansi\\ansicpg950\\deff0\\nouicompat{\\fonttbl{\\f0\\fnil\\fcharset136 DFKai-SB;}{\\f1\\fnil GenRyuMin JP M;}}{\\colortbl ;\\red255\\green0\\blue0;\\red0\\green0\\blue0;\\red166\\green166\\blue166;\\red255\\green255\\blue153;\\red182\\green221\\blue232;}\\viewkind4\\uc1\\pard\\f0\\fs30 `;
                    // ==================================================

                    let shadeToggle = 0;
                    let tokenized = [];
                    let tempInput = input;

                    if (finalImportant.length > 0) {
                        const pattern = new RegExp(`(${finalImportant.map(w => w.replace(/[.*+?^${}()|[\]\s\\]/g, '\\$&')).join('|')})`, 'g');
                        let lastIdx = 0;
                        let match;
                        while ((match = pattern.exec(tempInput)) !== null) {
                            if (match.index > lastIdx) tokenized.push({ text: tempInput.substring(lastIdx, match.index), type: 'plain' });
                            tokenized.push({ text: match[0], type: 'imp' });
                            lastIdx = pattern.lastIndex;
                        }
                        if (lastIdx < tempInput.length) tokenized.push({ text: tempInput.substring(lastIdx), type: 'plain' });
                    } else {
                        tokenized.push({ text: tempInput, type: 'plain' });

                    function formatSegment(text, markLevel, forceBracket = false, is4Char = false) {
                        let res = "";

                        const useShade = markLevel === 2 && Math.random() < (shadingVal / 100);

                        if (useBracket) res += `\\cf1 (\\cf0 `;

                            const startColor = Math.floor(Math.random() * 2);
                            res += startColor === 0 ? `\\cf1\\ul\\ulth\\ulc2 ` : `\\cf0\\ul\\ulth\\ulc1 `;
                            res += shadeToggle === 0 ? `\\chshdng0\\chcbpat4 ` : `\\chshdng0\\chcbpat5 `;
                            res += encodeRTFText(text.substring(0,2)) + `\\ulnone\\chcbpat0 `;
                            shadeToggle = 1 - shadeToggle;
                            res += (1 - startColor) === 0 ? `\\cf1\\ul\\ulth\\ulc2 ` : `\\cf0\\ul\\ulth\\ulc1 `;
                            res += shadeToggle === 0 ? `\\chshdng0\\chcbpat4 ` : `\\chshdng0\\chcbpat5 `;
                            res += encodeRTFText(text.substring(2,4)) + `\\ulnone\\chcbpat0 `;
                            shadeToggle = 1 - shadeToggle;
                        } else {

                                res += shadeToggle === 0 ? `\\chshdng0\\chcbpat4 ` : `\\chshdng0\\chcbpat5 `;

                            }
                            if (markLevel === 2) res += (Math.floor(Math.random()*2) === 0) ? `\\cf1\\ul\\ulth\\ulc2 ` : `\\cf0\\ul\\ulth\\ulc1 `;
                            else if (markLevel === 1) res += `\\cf1\\ul\\ulc3 `;

                    tokenized.forEach(token => {
                        if (token.type === 'imp') {

                            const subSegments = [...segmenter.segment(token.text)];
                            
                            // 保留原本包含目標符號的正則，防止其他狀況被誤判，但因為稍後我們會先攔截，所以不會互相干擾。
                            const punctRegex = /^[，。、！？；：→「」『』（）《》〈〉【】\s\n㈠㈡㈢㈣㈤㈥㈦㈧㈨㈩❶❷❸❹❺❻❼❽❾❿①②③④⑤⑥⑦⑧⑨⑩🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿ⒜⒝⒞⒟⒠⒡⒢⒣⒤⒥ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙ⑴⑵⑶⑷⑸⑹⑺⑻⑼⑽]+$/;

                            subSegments.forEach(seg => {
                                const sText = seg.segment;
                                if (sText === '\n' || sText === '\r\n') { rtf += '\\par\n'; return; }
                                
                                // === 新增：攔截特殊符號，強制套用指定格式 ===
                                if (SPECIAL_SYMBOLS.has(sText)) {
                                    // \f1: 第2字型 (GenRyuMin JP M)
                                    // \b: 粗體
                                    // \fs30: 15pt大小 (RTF 單位是半點，15*2=30)
                                    // \cf2: 預設純黑色 (呼叫 colortbl 的設定)
                                    rtf += `{\\f1\\b\\fs30\\cf2\\ulnone ${encodeRTFText(sText)}}`;
                                    return;
                                }
                                // ==========================================

                                if (!seg.isWordLike || punctRegex.test(sText)) {
                                    rtf += `\\cf2\\ulnone ${encodeRTFText(sText)}`;
                                    return;
                                }

                                const isIgnored = finalIgnored.includes(sText);
                                let markLevel = 0;
                                if (!isIgnored) {
                                    const isFit = sText.length >= 2 && sText.length <= 4;
                                    if (isFit && Math.random() < (enhanceVal/100)) markLevel = 2;
                                    else if (isFit && Math.random() < (verbVal/100)) markLevel = 1;
                                }
                                rtf += formatSegment(sText, markLevel, false, false);
                            });
                        }
                    });

                    rtf += `}`;
                    lastGeneratedRTF = rtf;
                    document.getElementById('outputStatus').value = rtf.substring(0, 500) + "...";

                    const blob = new Blob([rtf], { type: 'application/rtf;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = '標記文檔_' + new Date().getTime() + '.rtf';
                    link.click();

                } catch (e) {
                    console.error(e);
                    alert("處理發生錯誤，請檢查輸入內容。");
                }
                btn.disabled = false;
                btn.innerText = "🚀 生成並下載 Word";
            }, 50);
        }

        document.getElementById('btnGenerate').onclick = generate;
        document.getElementById('btnCopy').onclick = () => {
            if (!lastGeneratedRTF) return;
            const textArea = document.createElement("textarea");
            textArea.value = lastGeneratedRTF;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            const originalBtn = document.getElementById('btnCopy').innerText;
            document.getElementById('btnCopy').innerText = "✅ 已複製！";
            setTimeout(() => document.getElementById('btnCopy').innerText = originalBtn, 2000);
        };
    </script>
</body>
