<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; color: #333; }
        .header { color: #2b579a; border-bottom: 2px solid #2b579a; padding-bottom: 10px; }
        button { 
            background: #2b579a; color: white; border: none; padding: 12px; 
            width: 100%; cursor: pointer; border-radius: 4px; font-size: 16px; margin-top: 15px;
        }
        button:hover { background: #124078; }
        .status { margin-top: 10px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <h2 class="header">智能標記系統</h2>
    <p>請先在 Word 中選取一段文字，然後點擊下方按鈕進行標記。</p>
    
    <button onclick="runWordMarking()">執行標記 (Word 原生版)</button>
    <div id="status" class="status"></div>

    <script>
        Office.onReady();

        async function runWordMarking() {
            const status = document.getElementById('status');
            status.innerText = "處理中...";

            try {
                await Word.run(async (context) => {
                    const range = context.document.getSelection();
                    range.load("text");
                    await context.sync();

                    const fullText = range.text;
                    if (!fullText || fullText.trim() === "") {
                        status.innerText = "錯誤：未選取任何文字。";
                        return;
                    }

                    // --- 1. 使用你原本的分詞邏輯 ---
                    const segmenter = new Intl.Segmenter('zh-Hans', { granularity: 'word' });
                    const segments = segmenter.segment(fullText);

                    // --- 2. 針對特定長度詞彙或符號進行標記 ---
                    for (const { segment } of segments) {
                        // 範例規則：重要詞語 (2-4字) 變紅、粗體
                        if (segment.length >= 2 && segment.length <= 4) {
                            let searchResults = range.search(segment, { matchCase: false, ignorePunct: true });
                            searchResults.load("font");
                            await context.sync();
                            
                            searchResults.items.forEach(item => {
                                item.font.color = "#FF0000"; // 紅色
                                item.font.bold = true;
                            });
                        }
                        
                        // 範例規則：標點符號 (如 。) 變藍色
                        if (segment === "。" || segment === "，") {
                            let punctResults = range.search(segment);
                            punctResults.load("font");
                            await context.sync();
                            
                            punctResults.items.forEach(item => {
                                item.font.color = "#00B0F0"; // 藍色
                            });
                        }
                    }

                    await context.sync();
                    status.innerText = "標記完成！";
                });
            } catch (error) {
                status.innerText = "執行錯誤: " + error.message;
            }
        }
    </script>
</body>
</html>
